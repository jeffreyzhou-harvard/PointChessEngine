name: Champion Current Engines

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: "Where to run the Dockerized Champion jobs"
        required: true
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - champion-vm
      tier:
        description: "Champion gate to run"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - contract
          - milestone
          - perft
          - tournament
      milestone_task:
        description: "Milestone task used by the milestone/perft/orchestration gates"
        required: false
        default: C0_ENGINE_INTERFACE
      run_orchestration:
        description: "Run configured agent orchestration before evaluation"
        required: true
        default: false
        type: boolean
      orchestration_mode:
        description: "audit is reproducible/no-secrets; live may call model APIs"
        required: true
        default: audit
        type: choice
        options:
          - audit
          - live
  pull_request:
    paths:
      - ".github/workflows/champion-current-engines.yml"
      - "arena/**"
      - "engines/**"
      - "methodologies/**"
      - "infra/configs/champion/CURRENT_ENGINES.yaml"
      - "infra/docker/**"
      - "infra/scripts/**"
      - "requirements.txt"

env:
  CHAMPION_IMAGE: pointchess/champion:ci
  CHAMPION_IMAGE_TAR: champion-image.tar
  CHAMPION_CONFIG: infra/configs/champion/CURRENT_ENGINES.yaml
  CHAMPION_TASK: CURRENT_ENGINES
  CHAMPION_TIER: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
  CHAMPION_MILESTONE_TASK: ${{ github.event_name == 'workflow_dispatch' && inputs.milestone_task || 'C0_ENGINE_INTERFACE' }}
  CHAMPION_ORCHESTRATION_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.orchestration_mode || 'audit' }}
  CHAMPION_RUN_ORCHESTRATION: ${{ github.event_name == 'workflow_dispatch' && inputs.run_orchestration || false }}

jobs:
  build-image:
    name: Build Champion Docker Image
    runs-on: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.runner_target == 'champion-vm') && '["self-hosted","champion-vm"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f infra/docker/Dockerfile.champion \
            -t "$CHAMPION_IMAGE" \
            .

      - name: Save Docker image
        run: docker save "$CHAMPION_IMAGE" -o "$CHAMPION_IMAGE_TAR"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: champion-docker-image
          path: ${{ env.CHAMPION_IMAGE_TAR }}
          retention-days: 1

  candidate-smoke:
    name: ${{ matrix.candidate_id }} / ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
    needs: build-image
    runs-on: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.runner_target == 'champion-vm') && '["self-hosted","champion-vm"]' || '["ubuntu-latest"]') }}
    strategy:
      fail-fast: false
      matrix:
        candidate_id:
          - CURRENT_oneshot_nocontext
          - CURRENT_oneshot_contextualized
          - CURRENT_oneshot_react
          - CURRENT_chainofthought
          - CURRENT_langgraph
          - CURRENT_debate
          - CURRENT_rlm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: champion-docker-image

      - name: Load Docker image
        run: docker load -i "$CHAMPION_IMAGE_TAR"

      - name: Run candidate orchestration
        if: env.CHAMPION_RUN_ORCHESTRATION == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            -e OPENAI_API_KEY \
            -e ANTHROPIC_API_KEY \
            -e ANTHROPIC_KEY \
            -e GEMINI_API_KEY \
            -e GOOGLE_API_KEY \
            "$CHAMPION_IMAGE" \
            python infra/scripts/run_agent_orchestration.py \
              --config "$CHAMPION_CONFIG" \
              --candidate "${{ matrix.candidate_id }}" \
              --task "$CHAMPION_MILESTONE_TASK" \
              --mode "$CHAMPION_ORCHESTRATION_MODE"

      - name: Run candidate Champion tier
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            "$CHAMPION_IMAGE" \
            python infra/scripts/run_candidate_tests.py \
              --config "$CHAMPION_CONFIG" \
              --candidate "${{ matrix.candidate_id }}" \
              --tier "$CHAMPION_TIER" \
              --milestone-task "$CHAMPION_MILESTONE_TASK"

      - name: Upload candidate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: champion-${{ matrix.candidate_id }}
          path: |
            reports/comparisons/CURRENT_ENGINES/${{ matrix.candidate_id }}/
            reports/orchestration/${{ env.CHAMPION_MILESTONE_TASK }}/${{ matrix.candidate_id }}/
          if-no-files-found: warn
          retention-days: 7

  aggregate:
    name: Aggregate Champion Report
    needs: candidate-smoke
    if: always()
    runs-on: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.runner_target == 'champion-vm') && '["self-hosted","champion-vm"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download candidate artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: champion-CURRENT_*
          path: .champion-artifacts

      - name: Merge candidate artifacts
        run: |
          python infra/scripts/aggregate_champion_artifacts.py \
            --config "$CHAMPION_CONFIG" \
            --artifact-root .champion-artifacts \
            --summary-path ""

      - name: Score and write comparison
        run: |
          python infra/scripts/score_candidates.py --config "$CHAMPION_CONFIG"
          python infra/scripts/write_comparison_report.py --config "$CHAMPION_CONFIG"

      - name: Write GitHub summary
        run: |
          python infra/scripts/aggregate_champion_artifacts.py \
            --config "$CHAMPION_CONFIG" \
            --artifact-root .champion-artifacts

      - name: Upload aggregate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: champion-current-engines-report
          path: reports/comparisons/CURRENT_ENGINES/
          retention-days: 14

name: Candidate Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  candidate-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No root requirements.txt found; skipping dependency install."
          fi
          if find . -maxdepth 3 -name requirements.txt | grep -q .; then
            echo "Additional nested requirements files may exist; install them in task-specific jobs if needed."
          fi

      - name: Run pytest if available
        run: |
          if find . -path '*/tests/*' -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            if python -c "import pytest" 2>/dev/null; then
              pytest
            else
              echo "pytest is not installed; falling back to unittest discovery."
              python -m unittest discover -v
            fi
          else
            echo "::warning::No Python tests found."
          fi

      - name: Run placeholder contract tests if available
        run: |
          if [ -d tests/contract ] && find tests/contract -type f -name 'test_*.py' | grep -q .; then
            python -m unittest discover -s tests/contract -v
          else
            echo "::warning::No executable contract tests found yet."
          fi

      - name: Champion script smoke check
        run: |
          python scripts/run_champion_stage.py \
            --task C3_STATIC_EVALUATION \
            --config configs/champion/C3_STATIC_EVALUATION.yaml.example \
            --dry-run

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PyChess</title>
<style>
  body { font-family: system-ui, sans-serif; background:#1f2228; color:#eee;
         display:flex; flex-direction:column; align-items:center; padding:20px; }
  h1 { margin-top:0; }
  #board { display:grid; grid-template-columns:repeat(8, 56px);
           grid-template-rows:repeat(8, 56px); border:2px solid #444; }
  .sq { display:flex; align-items:center; justify-content:center;
        font-size:38px; cursor:pointer; user-select:none; }
  .light { background:#f0d9b5; color:#222; }
  .dark  { background:#b58863; color:#222; }
  .selected { outline:3px solid #ffeb3b; outline-offset:-3px; }
  .target   { box-shadow: inset 0 0 0 4px rgba(0,255,0,0.4); }
  #controls { margin-top:14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  #status { margin-top:10px; min-height:1.4em; font-weight:bold; }
  label { font-size:0.95em; }
  input[type=range] { vertical-align:middle; }
  button { padding:6px 12px; }
</style>
</head>
<body>
<h1>PyChess</h1>
<div id="board"></div>
<div id="status"></div>
<div id="controls">
  <label>You play:
    <select id="color">
      <option value="w" selected>White</option>
      <option value="b">Black</option>
    </select>
  </label>
  <label>ELO: <span id="elo-val">1500</span>
    <input id="elo" type="range" min="400" max="2400" step="50" value="1500" />
  </label>
  <button id="newgame">New Game</button>
  <button id="stop">Stop Engine</button>
</div>
<script src="/static/app.js"></script>
</body>
</html>

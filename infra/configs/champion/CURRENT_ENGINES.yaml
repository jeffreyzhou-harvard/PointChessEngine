# Champion mode config for evaluating the engines currently checked into the repo.
#
# This is not a candidate-generation milestone. It treats each existing engine
# artifact as a candidate so the Champion runner can execute them in parallel,
# record logs, score basic UCI readiness, and write a comparison report.

task_id: CURRENT_ENGINES
baseline_branch: main
canonical_branch: main
candidate_root: .
report_root: reports/comparisons
parallel_jobs: 7
command_timeout_seconds: 45

test_commands:
  - "{python} infra/scripts/uci_smoke.py --engine {engine_id} --movetime-ms 75"

tiers:
  smoke:
    description: Fast Docker matrix for PRs. Starts each registered engine and checks one legal UCI bestmove.
    test_commands:
      - "{python} infra/scripts/uci_smoke.py --engine {engine_id} --movetime-ms 75"
  contract:
    description: Shared UCI contract suite for each registered engine.
    test_commands:
      - "{python} infra/scripts/run_contract_for_engine.py --engine {engine_id}"
  milestone:
    description: Classical milestone gate selected by --milestone-task, including previous C* regressions.
    test_commands:
      - "{python} infra/scripts/run_milestone_tests.py --task {milestone_task_id}"
  perft:
    description: Current canonical perft gate; deeper per-engine perft requires a future debug/perft UCI extension.
    test_commands:
      - "{python} infra/scripts/run_perft_gate.py --engine {engine_id}"
  tournament:
    description: Manual/scheduled FastChess and Stockfish calibration gate.
    test_commands:
      - "{python} infra/scripts/run_tournament_gate.py --engine {engine_id}"

score_weights:
  correctness_tests: 35
  code_review_quality: 20
  interface_compatibility: 15
  performance_engine_impact: 15
  cost_time_efficiency: 10
  documentation_report_quality: 5

candidates:
  - candidate_id: CURRENT_oneshot_nocontext
    task_id: CURRENT_ENGINES
    engine_id: oneshot_nocontext
    orchestration_type: one_shot_no_context
    model_assignments:
      builder: claude
    execution_environment: local_repo
    branch_name: main
    worktree_path: .
    output_report_path: reports/tasks/CURRENT_oneshot_nocontext.md
    notes: Existing one-shot no-context engine artifact.

  - candidate_id: CURRENT_oneshot_contextualized
    task_id: CURRENT_ENGINES
    engine_id: oneshot_contextualized
    orchestration_type: one_shot_with_context
    model_assignments:
      builder: claude
    execution_environment: local_repo
    branch_name: main
    worktree_path: .
    output_report_path: reports/tasks/CURRENT_oneshot_contextualized.md

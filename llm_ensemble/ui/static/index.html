<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PointChess Ensemble</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- Left column: controls -->
    <aside id="controls">
      <h1>PointChess<br/><span class="sub">Ensemble</span></h1>

      <section class="ctrl-group">
        <label>Play as</label>
        <div class="btn-row">
          <button id="btn-white" class="side-btn active" onclick="setSide('white')">White</button>
          <button id="btn-black" class="side-btn" onclick="setSide('black')">Black</button>
        </div>
      </section>

      <section class="ctrl-group">
        <label>Engine ELO: <span id="elo-display">1500</span></label>
        <input type="range" id="elo-slider" min="400" max="2400" step="50" value="1500"
               oninput="updateElo(this.value)" />
        <div class="elo-labels"><span>400</span><span>2400</span></div>
      </section>

      <section class="ctrl-group">
        <label>Voting method</label>
        <select id="voting-method" onchange="updateMethod(this.value)">
          <option value="plurality">Plurality</option>
          <option value="score_weighted">Score-weighted</option>
          <option value="consensus">Consensus</option>
        </select>
      </section>

      <section class="ctrl-group">
        <div class="btn-row">
          <button onclick="newGame()">New Game</button>
          <button onclick="undoMove()">Undo</button>
          <button onclick="resign()" id="btn-resign">Resign</button>
        </div>
      </section>

      <section id="move-list-section" class="ctrl-group">
        <label>Moves</label>
        <div id="move-list"></div>
      </section>
    </aside>

    <!-- Center: chess board -->
    <main id="board-wrap">
      <div id="board-container">
        <div id="board"></div>
        <div id="promotion-modal" class="hidden">
          <div class="modal-inner">
            <p>Promote to:</p>
            <div class="promo-row">
              <button onclick="promote('q')">♛ Queen</button>
              <button onclick="promote('r')">♜ Rook</button>
              <button onclick="promote('b')">♝ Bishop</button>
              <button onclick="promote('n')">♞ Knight</button>
            </div>
          </div>
        </div>
      </div>
      <div id="status-bar">Ready</div>
    </main>

    <!-- Right column: ensemble panel -->
    <aside id="ensemble-panel">
      <h2>LLM Voting Panel</h2>

      <section id="thinking-indicator" class="hidden">
        <div class="spinner"></div>
        <span>LLMs are voting…</span>
      </section>

      <section id="vote-results">
        <p class="placeholder">Engine vote results will appear here after each engine move.</p>
      </section>

      <section id="candidate-list">
        <h3>Candidates</h3>
        <div id="candidates"></div>
      </section>

      <section id="engine-stats">
        <h3>Search Stats</h3>
        <table id="stats-table">
          <tr><td>Depth</td><td id="stat-depth">—</td></tr>
          <tr><td>Nodes</td><td id="stat-nodes">—</td></tr>
          <tr><td>Score</td><td id="stat-score">—</td></tr>
          <tr><td>Time</td><td id="stat-time">—</td></tr>
          <tr><td>ELO</td><td id="stat-elo">—</td></tr>
          <tr><td>Method</td><td id="stat-method">—</td></tr>
        </table>
      </section>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
